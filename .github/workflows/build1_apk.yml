# 构建任务名称
name: Build Flutter APK

# 触发条件：推送代码到main分支时自动构建，也支持手动触发
on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 手动触发开关

# 构建任务配置
jobs:
  build_apk:
    # 使用Ubuntu系统（云端服务器，无安全限制）
    runs-on: ubuntu-latest
    
    steps:
      # 步骤1：拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：配置Java环境（Flutter构建APK必需，选17版本）
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle  # 缓存Gradle，加速后续构建

      # 步骤3：配置Flutter环境（稳定版3.22.0）
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true  # 缓存Flutter依赖

      # 步骤4：安装项目依赖
      - name: Install dependencies
        run: flutter pub get

      # 步骤5：构建Release版本APK（核心步骤）
      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      # 步骤6：上传构建好的APK（方便下载）
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk  # 下载包的名称
          path: build/app/outputs/flutter-apk/app-release.apk  # APK生成路径
